<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro de Bogota - MEBOG</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/c0eeba16d1.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  
  <header>     
    <div class="Titulo_1"><h1>MEBOG</h1></div>   
    <div class="Iconos">     
      <div class="perfil" id="boton-perfil" title="Mi Cuenta">
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="carro_compra" id="boton-carrito" title="Tienda">
        <i class="fa-solid fa-cart-shopping fa-flip-horizontal"></i>
      </div>
      <div class="preguntas_frecuentes" id="preguntas_frecuentes" title="Ayuda">
        <i class="fa-regular fa-circle-question"></i>
      </div>
    </div>     
  </header>
    
  <nav class="Menu_Navegacion">      
    <a class="enlace_navegacion">Tarifas y Planes</a> 
    <a class="enlace_navegacion">Personaliza tu Tarjeta</a> 
    <a class="enlace_navegacion">Mi Tarjeta</a> 
    <a class="enlace_navegacion">Líneas de Metro</a>         
    <a class="enlace_navegacion">Tienda Metro</a>     
  </nav>     

  <img src="img_principal.png" alt="Metro de Bogotá" class="Imagen_Principal_Metro">

  <div class="cajas_centrales">
    <button class="boton-interactivo" id="btn-mapa">Mapa interactivo</button>
    <button class="boton-Ocio" id="btn-ocio">Ocio</button>
    <button class="boton-Servicios" id="btn-servicios">Servicios</button>
    <button class="boton-Estaciones" id="btn-estaciones">Estaciones</button> 
    <button class="boton-Juegos" id="btn-juegos">Juegos</button>
    <button class="boton-Lineas" id="btn-lineas-info">Lineas Metro</button>  
  </div>

  <div class="Ultimas_Noticias" style="text-align: center; font-weight: bold; padding: 20px; font-size: 1.5rem;">
    Últimas Noticias
  </div>

  <div class="slider-container">
    <div class="slider">
      <div class="slide"><img src="Noticia_1.jpg" alt="Avance de obra L1"></div>
      <div class="slide"><img src="Noticia_2.jpeg" alt="Nuevos trenes"></div>
      <div class="slide"><img src="Noticia_3.jpg" alt="Cultura Metro"></div>
    </div>
    <div class="buttons">
      <button onclick="prevSlide()"><i class="fa-solid fa-arrow-left"></i></button>
      <button onclick="nextSlide()"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
    <div class="dots-container"></div>
  </div>

  <div class="contactenos"> 
    <div class="movil_whatsapp">
      <i class="fa-brands fa-whatsapp"></i><i class="fa-solid fa-phone-volume"></i>
      <p class="contacto_p1">Atención al Cliente <br> (601) 5553333</p>
    </div> 
    <div class="sedes">
      <i class="fa-solid fa-location-dot"></i>
      <p class="contacto_p2">Sede principal <br> Calle 26 15 - 09</p>
    </div>
  </div>

  <div id="root-registro"></div>

  <script src="script.js"></script>
  <script type="text/babel" src="Registro.js"></script>

</body>
</html>
